name: Validate Posts

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'validate_posts.py'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python validate_posts.py
